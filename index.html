<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叶老师的背书室 (Recitation Sandbox)</title>
</head>

<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5">
                    </path>
                </svg>
                <h1 class="text-xl font-bold text-slate-900">叶老师的背书室</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="exportData()"
                    class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    备份数据
                </button>
                <button onclick="document.getElementById('importFile').click()"
                    class="px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    导入恢复
                </button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div id="view-lobby" class="space-y-6">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">班级大厅</h2>
                    <p class="text-sm text-slate-500 mt-1">进入一个班级，或创建新班级。</p>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="classListContainer">
            </div>
        </div>

        <div id="view-sandbox"
            class="hidden-view h-[calc(100vh-4rem)] flex flex-col relative bg-slate-100 overflow-hidden">
            <div class="absolute top-4 left-4 z-10 flex gap-2">
                <button onclick="switchView('lobby')"
                    class="px-4 py-2 bg-white text-slate-700 shadow-md rounded-lg text-sm font-medium hover:bg-slate-50 transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    返回大厅
                </button>
                <button onclick="createGroup()"
                    class="px-4 py-2 bg-white text-slate-700 shadow-md rounded-lg text-sm font-medium hover:bg-slate-50 transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    添加小组
                </button>
            </div>

            <div class="absolute top-4 right-4 z-10 flex gap-2">
                <button onclick="openSettings()"
                    class="px-4 py-2 bg-slate-600 text-white shadow-md rounded-lg text-sm font-medium hover:bg-slate-700 transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    打卡设置
                </button>
                <button onclick="showLeaderboard()"
                    class="px-4 py-2 bg-amber-500 text-white shadow-md rounded-lg text-sm font-medium hover:bg-amber-600 transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    排行榜
                </button>

                <div class="relative" id="addStudentDropdownContainer">
                    <button onclick="toggleAddStudentMenu()"
                        class="px-4 py-2 bg-indigo-600 text-white shadow-md rounded-lg text-sm font-medium hover:bg-indigo-700 transition flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                        添加学生
                    </button>
                    <div id="addStudentMenu"
                        class="hidden-view absolute right-0 mt-2 w-36 bg-white rounded-lg shadow-lg border border-slate-100 z-50 overflow-hidden">
                        <button onclick="addSingleStudent()"
                            class="w-full text-left px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition-colors border-b border-slate-50">手动添加单个</button>
                        <button onclick="document.getElementById('importTxtFile').click(); toggleAddStudentMenu();"
                            class="w-full text-left px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition-colors">批量导入
                            TXT</button>
                    </div>
                    <input type="file" id="importTxtFile" class="hidden" accept=".txt"
                        onchange="handleTxtImport(event)">
                </div>
            </div>

            <div class="flex-1 relative w-full h-full p-6 pt-20 overflow-y-auto wood-floor" id="mapArea">
                <div class="mb-6"><span id="currentClassNameDisplay"
                        class="text-2xl font-bold text-slate-800 drop-shadow-sm"></span></div>
                <div id="groupsContainer" class="flex flex-wrap gap-10 items-start"></div>
            </div>

            <div class="h-56 bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex flex-col z-10"
                ondragover="handleDragOver(event)" ondrop="handleDropOnWaitingRoom(event)">
                <div class="px-6 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="text-sm font-bold text-slate-700">未分组学生 (拖拽回此处可取消座位)</h3>
                    <span class="text-xs font-medium text-indigo-700 bg-indigo-100 px-3 py-1 rounded-full"
                        id="waitingCount">0 人</span>
                </div>
                <div class="flex-1 overflow-y-auto p-6 flex flex-wrap gap-4 content-start" id="waitingRoom"></div>
            </div>
        </div>

        <div id="modalOverlay"
            class="fixed inset-0 bg-slate-900/40 z-50 hidden-view flex items-center justify-center backdrop-blur-sm transition-opacity">
            <div id="matrixModal"
                class="bg-white rounded-2xl shadow-xl w-11/12 max-w-4xl max-h-[85vh] flex flex-col hidden-view overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <div class="flex items-center gap-3">
                        <div id="matrixAvatar"
                            class="w-10 h-10 rounded-full border border-slate-200 overflow-hidden bg-white"></div>
                        <h3 class="text-lg font-bold text-slate-800" id="matrixStudentName">学生姓名</h3>
                        <span class="text-sm font-medium text-amber-600 bg-amber-100 px-2 py-0.5 rounded-full"
                            id="matrixTotalScore">0 分</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="deleteCurrentStudent()"
                            class="text-sm font-medium text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-md transition-colors flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                </path>
                            </svg> 开除
                        </button>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 ml-1">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto p-6 bg-slate-50/50">
                    <div id="matrixTableContainer"></div>
                </div>
            </div>

            <div id="leaderboardModal"
                class="bg-white rounded-2xl shadow-xl w-11/12 max-w-2xl max-h-[85vh] flex flex-col hidden-view overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                            </path>
                        </svg> 班级光荣榜
                    </h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex border-b border-slate-200">
                    <button onclick="switchTab('personal')" id="tab-personal"
                        class="flex-1 py-3 text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 bg-indigo-50/30">个人积分榜</button>
                    <button onclick="switchTab('group')" id="tab-group"
                        class="flex-1 py-3 text-sm font-bold text-slate-500 hover:text-slate-700">小组总分榜</button>
                </div>
                <div class="flex-1 overflow-auto p-0" id="leaderboardContent"></div>
            </div>

            <div id="settingsModal"
                class="bg-white rounded-2xl shadow-xl w-11/12 max-w-2xl max-h-[85vh] flex flex-col hidden-view overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg> 班级打卡与任务控制台
                    </h3>
                    <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-600 p-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex-1 overflow-auto p-6 bg-white">
                    <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-2">
                        <h4 class="font-bold text-slate-700">进度分组与任务管理 <span
                                class="text-xs font-normal text-slate-400 ml-2">(各班独立)</span></h4>
                        <div class="flex gap-2">
                            <button onclick="showClassSyncPicker()"
                                class="text-sm text-teal-600 hover:text-teal-800 font-medium bg-teal-50 hover:bg-teal-100 px-3 py-1.5 rounded-md transition flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                                </svg>
                                同步其他班级
                            </button>
                            <button onclick="addColGroup()"
                                class="text-sm text-indigo-600 hover:text-indigo-800 font-medium bg-indigo-50 px-3 py-1.5 rounded-md transition">+
                                新建大分组</button>
                        </div>
                    </div>
                    <div id="settingsColsList" class="flex flex-col gap-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 班级选择器：同步其他班级的分组与任务 -->
    <div id="classSyncModal"
        class="fixed inset-0 bg-slate-900/50 z-[100] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden flex flex-col max-h-[70vh]">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50 shrink-0">
                <div>
                    <h3 class="text-base font-bold text-slate-800">📋 同步其他班级的模板</h3>
                    <p class="text-xs text-slate-400 mt-0.5">选择一个源班级，将其分组与任务深拷贝到当前班级</p>
                </div>
                <button onclick="closeClassSyncModal()" class="text-slate-400 hover:text-slate-600 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="classSyncList" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
        </div>
    </div>

    <!-- 自定义输入弹窗（替代 window.prompt） -->
    <div id="customPromptOverlay"
        class="fixed inset-0 bg-slate-900/50 z-[100] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <div class="px-6 pt-6 pb-4">
                <p id="customPromptMessage" class="text-slate-700 font-medium text-base mb-3"></p>
                <input id="customPromptInput" type="text"
                    class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                    placeholder="" />
            </div>
            <div class="flex border-t border-slate-100">
                <button id="customPromptCancel"
                    class="flex-1 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 transition-colors">
                    取消
                </button>
                <button id="customPromptOk"
                    class="flex-1 py-3 text-sm font-bold text-indigo-600 hover:bg-indigo-50 transition-colors border-l border-slate-100">
                    确认
                </button>
            </div>
        </div>
    </div>

    <!-- 自定义确认弹窗（替代 window.confirm） -->
    <div id="customConfirmOverlay"
        class="fixed inset-0 bg-slate-900/50 z-[100] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <div class="px-6 pt-6 pb-4">
                <p id="customConfirmMessage" class="text-slate-700 font-medium text-base leading-relaxed"></p>
            </div>
            <div class="flex border-t border-slate-100">
                <button id="customConfirmCancel"
                    class="flex-1 py-3 text-sm font-medium text-slate-500 hover:bg-slate-50 transition-colors">
                    取消
                </button>
                <button id="customConfirmOk"
                    class="flex-1 py-3 text-sm font-bold text-red-500 hover:bg-red-50 transition-colors border-l border-slate-100">
                    确认删除
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
