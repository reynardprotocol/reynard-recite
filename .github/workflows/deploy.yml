# GitHub Actions 自动部署工作流
# 触发条件：每次推送代码到 main 分支时自动执行
# 作用：自动构建 Vite 项目并部署到 GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 监听 main 分支的推送

  # 允许手动在 GitHub 网站上点按钮触发
  workflow_dispatch:

# 设置部署所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同一时间只有一个部署任务在运行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        # npm run build 会调用 vite build，输出到 dist/ 目录

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist  # Vite 构建输出目录

  # 部署任务（依赖构建任务成功）
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
